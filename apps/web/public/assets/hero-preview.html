<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>memoo preview</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --text:#1B2A4A;--muted:#6B7A8D;--bg:#F5F2ED;
  --line:rgba(27,42,74,0.08);--teal:#1b8b82;
  --sand:#d98a3f;--ease:cubic-bezier(.22,1,.36,1);
}
html,body{width:100%;height:100%;background:var(--bg);font-family:system-ui,-apple-system,sans-serif;color:var(--text);overflow:hidden}

.frame{position:absolute;inset:6px;border-radius:16px;border:1px solid rgba(27,42,74,0.1);background:#fff;display:grid;grid-template-columns:1fr 180px;overflow:hidden}

/* ── Browser ── */
.browser{display:flex;flex-direction:column;border-right:1px solid var(--line)}
.bar{padding:8px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.dots{display:flex;gap:4px}
.dots span{width:8px;height:8px;border-radius:50%}
.dots span:nth-child(1){background:#f87171}
.dots span:nth-child(2){background:#fbbf24}
.dots span:nth-child(3){background:#4ade80}
.url{flex:1;font-size:10px;color:var(--muted)}

/* Phase badge */
.badge{font-size:9px;font-weight:900;letter-spacing:.1em;padding:3px 10px;border-radius:999px;transition:all .3s}
.badge.rec{background:rgba(220,38,38,0.08);color:#dc2626;border:1px solid rgba(220,38,38,0.12)}
.badge.play{background:rgba(27,139,130,0.08);color:var(--teal);border:1px solid rgba(27,139,130,0.12)}

/* Form */
.form{flex:1;padding:20px 24px;position:relative}
.form-title{font-size:15px;font-weight:900;margin-bottom:16px}
.field{margin-bottom:10px}
.field-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:4px}
.field-box{height:32px;border-radius:8px;border:1px solid var(--line);padding:0 10px;font-size:12px;display:flex;align-items:center;transition:border-color .2s,background .2s}
.field-box.filled{border-color:rgba(27,139,130,.25);background:rgba(27,139,130,.02)}
.submit{margin-top:14px;width:100%;padding:10px;border-radius:10px;border:none;background:var(--text);color:#fff;font-size:12px;font-weight:800;transition:background .2s}
.submit.ok{background:var(--teal)}

/* Cursor */
.cursor{position:absolute;width:16px;height:20px;pointer-events:none;z-index:10;opacity:0;transition:left .4s var(--ease),top .4s var(--ease),opacity .2s}
.hand{position:absolute;width:20px;height:20px;pointer-events:none;z-index:10;opacity:0;transition:left .4s var(--ease),top .4s var(--ease),opacity .2s}

/* ── Sidebar ── */
.sidebar{padding:14px 12px;display:flex;flex-direction:column}
.side-title{font-size:9px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.step{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:8px;border:1px solid var(--line);font-size:10px;font-weight:700;color:var(--muted);margin-bottom:5px;opacity:0;transform:translateX(8px);transition:all .3s var(--ease)}
.step.show{opacity:1;transform:translateX(0)}
.step.done{border-color:rgba(27,139,130,.2);color:var(--teal);background:rgba(27,139,130,.03)}
.step-n{width:18px;height:18px;border-radius:50%;background:rgba(27,42,74,.06);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;flex-shrink:0;transition:all .2s}
.step.done .step-n{background:var(--teal);color:#fff}

.side-footer{margin-top:auto;text-align:center;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);opacity:0;transition:opacity .3s}
.side-footer.show{opacity:1}
</style>
</head>
<body>
<div class="frame">
  <div class="browser">
    <div class="bar">
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="url">crm.example.com/new-contact</div>
      <div class="badge" id="badge"></div>
    </div>
    <div class="form" id="form">
      <div class="form-title">New contact</div>
      <div class="field"><div class="field-label">Name</div><div class="field-box" id="f1"></div></div>
      <div class="field"><div class="field-label">Email</div><div class="field-box" id="f2"></div></div>
      <div class="field"><div class="field-label">Company</div><div class="field-box" id="f3"></div></div>
      <button class="submit" id="btn">Create contact</button>
      <svg class="cursor" id="cur" viewBox="0 0 14 18" fill="#4A7FB5"><path d="M0 0v14l3.5-3.5 2.3 6 1.4-.6-2.2-5.6 4-0Z"/></svg>
      <svg class="hand" id="hand" viewBox="0 0 24 24" fill="#4A7FB5"><path d="M8 18c-2.2 0-4-1.8-4-4v-4c0-.6.4-1 1-1s1 .4 1 1v3h1V5c0-.6.4-1 1-1s1 .4 1 1v6h1V3.5c0-.6.4-1 1-1s1 .4 1 1V11h1V4.5c0-.6.4-1 1-1s1 .4 1 1V12h1V7c0-.6.4-1 1-1s1 .4 1 1v7c0 2.2-1.8 4-4 4H8z"/></svg>
    </div>
  </div>
  <div class="sidebar">
    <div class="side-title" id="stitle">Extracting steps…</div>
    <div class="step" id="s0"><span class="step-n">1</span>Open form</div>
    <div class="step" id="s1"><span class="step-n">2</span>Type name</div>
    <div class="step" id="s2"><span class="step-n">3</span>Type email</div>
    <div class="step" id="s3"><span class="step-n">4</span>Type company</div>
    <div class="step" id="s4"><span class="step-n">5</span>Click submit</div>
    <div class="side-footer" id="sfooter"></div>
  </div>
</div>

<script>
const badge = document.getElementById('badge');
const cur = document.getElementById('cur');
const hand = document.getElementById('hand');
const stitle = document.getElementById('stitle');
const sfooter = document.getElementById('sfooter');
const steps = [0,1,2,3,4].map(i => document.getElementById('s'+i));
const flds = ['f1','f2','f3'].map(id => document.getElementById(id));
const btn = document.getElementById('btn');
const formEl = document.getElementById('form');

// Position cursor relative to the .form container using DOM rects
function pos(el) {
  const fr = formEl.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  return { x: er.left - fr.left, y: er.top - fr.top };
}

function moveCur(el, offX, offY) {
  const p = pos(el);
  cur.style.left = (p.x + offX) + 'px';
  cur.style.top = (p.y + offY) + 'px';
  cur.style.opacity = '1';
  hand.style.opacity = '0';
}

function moveHand(el, offX, offY) {
  const p = pos(el);
  hand.style.left = (p.x + offX) + 'px';
  hand.style.top = (p.y + offY) + 'px';
  hand.style.opacity = '1';
  cur.style.opacity = '0';
}

function hideCursors() { cur.style.opacity = '0'; hand.style.opacity = '0'; }

function type(el, text, cb) {
  let i = 0;
  const t = setInterval(() => {
    i++; el.textContent = text.substring(0, i);
    if (i >= text.length) { clearInterval(t); el.classList.add('filled'); cb && cb(); }
  }, 50);
}

function reset() {
  hideCursors();
  // Move cursors off-screen instantly (no transition)
  cur.style.transition = 'none'; hand.style.transition = 'none';
  cur.style.left = '-30px'; cur.style.top = '40px';
  hand.style.left = '-30px'; hand.style.top = '40px';
  requestAnimationFrame(() => {
    cur.style.transition = 'left .5s var(--ease), top .45s var(--ease), opacity .2s';
    hand.style.transition = 'left .5s var(--ease), top .45s var(--ease), opacity .2s';
  });
  badge.className = 'badge'; badge.textContent = '';
  stitle.textContent = 'Extracting steps…';
  sfooter.classList.remove('show'); sfooter.textContent = '';
  flds.forEach(f => { f.textContent = ''; f.className = 'field-box'; });
  btn.className = 'submit'; btn.textContent = 'Create contact';
  steps.forEach(s => s.className = 'step');
}

function record(done) {
  badge.className = 'badge rec'; badge.textContent = '● REC';
  const tl = [
    { t:200, fn:() => steps[0].classList.add('show') },
    // Move to name field (click inside, left-center area)
    { t:600, fn:() => moveCur(flds[0], 30, 8) },
    { t:1000, fn:() => type(flds[0], 'Jane Doe', () => steps[1].classList.add('show')) },
    // Move to email field
    { t:2200, fn:() => moveCur(flds[1], 50, 8) },
    { t:2600, fn:() => type(flds[1], 'jane@acme.io', () => steps[2].classList.add('show')) },
    // Move to company field
    { t:4000, fn:() => moveCur(flds[2], 20, 8) },
    { t:4400, fn:() => type(flds[2], 'Acme Inc', () => steps[3].classList.add('show')) },
    // Move to button — switch to hand
    { t:5500, fn:() => moveHand(btn, 60, 2) },
    { t:5900, fn:() => { btn.classList.add('ok'); btn.textContent='✓ Created'; steps[4].classList.add('show'); hideCursors(); }},
    { t:6900, fn:() => { badge.className='badge'; sfooter.textContent='5 steps captured'; sfooter.classList.add('show'); }},
    { t:7900, fn:done },
  ];
  tl.forEach(({t,fn}) => setTimeout(fn, t));
}

function replay(done) {
  flds.forEach(f => { f.textContent=''; f.className='field-box'; });
  btn.className='submit'; btn.textContent='Create contact';
  steps.forEach(s => s.className = 'step show');
  stitle.textContent = 'Re-executing…';
  badge.className='badge play'; badge.textContent='▶ REPLAY';
  sfooter.classList.remove('show');

  const data = [
    { t:300, i:0, fn:()=>{} },
    { t:900, i:1, fn:()=>{ flds[0].textContent='Jane Doe'; flds[0].classList.add('filled'); }},
    { t:1600, i:2, fn:()=>{ flds[1].textContent='jane@acme.io'; flds[1].classList.add('filled'); }},
    { t:2300, i:3, fn:()=>{ flds[2].textContent='Acme Inc'; flds[2].classList.add('filled'); }},
    { t:3000, i:4, fn:()=>{ btn.classList.add('ok'); btn.textContent='✓ Created'; }},
  ];
  data.forEach(({t,i,fn}) => setTimeout(() => { fn(); steps[i].classList.add('done'); }, t));
  setTimeout(() => { badge.className='badge'; stitle.textContent='All steps passed ✓'; sfooter.textContent='Playbook complete'; sfooter.classList.add('show'); }, 3600);
  setTimeout(done, 5200);
}

function loop() { reset(); record(() => replay(() => setTimeout(loop, 2000))); }
setTimeout(loop, 300);
</script>
</body>
</html>
