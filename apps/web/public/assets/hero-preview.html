<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>memoo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #0f678f;
  --blue2: #0c557a;
  --sage: #0f8f7e;
  --sand: #d18434;
  --text: #102131;
  --muted: #4d6374;
  --bg: #e4ecf4;
  --line: rgba(149,169,186,0.6);
  --ease: cubic-bezier(0.22,1,0.36,1);
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: system-ui, -apple-system, sans-serif;
  color: var(--text);
  overflow: hidden;
}

/* ── ambient background ── */
.stage {
  width: 100%; height: 100%;
  position: relative;
  background:
    radial-gradient(800px 500px at -10% -5%,  rgba(15,143,126,0.22), transparent 65%),
    radial-gradient(700px 400px at 105%  0%,  rgba(15,103,143,0.28), transparent 65%),
    radial-gradient(500px 400px at 50%  110%, rgba(209,132,52,0.18), transparent 65%),
    linear-gradient(170deg, #dce8f2 0%, #e2ecf5 100%);
  animation: bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  from { filter: brightness(1);    }
  to   { filter: brightness(1.04); }
}

/* ── glass shell ── */
.shell {
  position: absolute; inset: 10px;
  border-radius: 22px;
  border: 1px solid rgba(255,255,255,0.75);
  background: rgba(246,251,255,0.86);
  backdrop-filter: blur(28px);
  box-shadow:
    0 0 0 1px rgba(149,169,186,0.35),
    0 24px 60px rgba(15,33,52,0.14);
  display: grid;
  grid-template-columns: 190px 1fr;
  overflow: hidden;
}

/* ── sidebar ── */
.sidebar {
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(250,253,255,0.98), rgba(242,248,253,0.94));
  padding: 18px 12px;
  display: flex; flex-direction: column; gap: 5px;
}
.logo {
  display: flex; align-items: center; gap: 9px;
  font-weight: 900; font-size: 15px; letter-spacing: -0.04em;
  margin-bottom: 16px; color: var(--text);
}
.logo-mark {
  display: grid; grid-template-columns: repeat(2, 9px);
  grid-template-rows: repeat(2, 9px); gap: 2.5px;
}
.logo-mark span { border-radius: 999px; }
.logo-mark span:nth-child(1) { background: var(--blue); }
.logo-mark span:nth-child(2) { background: var(--sage); }
.logo-mark span:nth-child(3) { background: var(--sand); grid-column: span 2; }

.nav {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 14px;
  font-size: 12.5px; font-weight: 600; color: var(--muted);
}
.nav.active {
  background: rgba(15,103,143,0.10);
  color: var(--blue);
  border: 1px solid rgba(15,103,143,0.18);
}
.nav-ico {
  width: 26px; height: 26px; border-radius: 50%;
  background: currentColor; opacity: 0.12;
  flex-shrink: 0; position: relative;
}
.nav svg { position: absolute; inset: 6px; }

/* ── live badge ── */
.live-badge {
  margin-top: auto; margin-bottom: 4px;
  display: flex; align-items: center; gap: 7px;
  padding: 7px 10px; border-radius: 12px;
  background: rgba(15,143,126,0.10);
  border: 1px solid rgba(15,143,126,0.25);
  font-size: 11px; font-weight: 700; color: var(--sage);
}
.pulse-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--sage); flex-shrink: 0;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.5; transform: scale(0.7); }
}

/* ── main area ── */
.main {
  display: flex; flex-direction: column;
  padding: 18px 18px 14px;
  gap: 14px;
  overflow: hidden;
}

/* ── top row: greeting + run CTA ── */
.top-row {
  display: flex; align-items: flex-start; justify-content: space-between;
}
.greeting-kicker {
  font-size: 10.5px; font-weight: 800; letter-spacing: 0.13em;
  text-transform: uppercase; color: var(--blue); margin-bottom: 3px;
}
.greeting-title {
  font-size: 20px; font-weight: 800; letter-spacing: -0.03em;
}
.greeting-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

.run-btn {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue); color: white;
  border: none; border-radius: 999px;
  padding: 9px 18px; font-size: 12px; font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(15,103,143,0.35);
}

/* ── stat cards ── */
.stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.stat-card {
  border-radius: 16px; border: 1px solid var(--line);
  background: white; padding: 12px 14px;
  box-shadow: 0 6px 18px rgba(15,33,52,0.06);
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2.5px;
  border-radius: 0 0 16px 16px;
}
.stat-card:nth-child(1)::before { background: linear-gradient(90deg, var(--blue), var(--sage)); }
.stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--sage), #59b9aa); }
.stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--sand), #e8a050); }
.stat-label { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.stat-value {
  font-size: 26px; font-weight: 900; letter-spacing: -0.04em; margin-top: 2px;
  font-variant-numeric: tabular-nums;
}
.stat-delta {
  font-size: 10.5px; font-weight: 700; margin-top: 4px;
  display: inline-flex; align-items: center; gap: 3px;
  color: var(--sage);
}

/* ── bottom grid ── */
.bottom-grid {
  display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px;
  flex: 1; min-height: 0;
}

/* ── runs list ── */
.runs-panel {
  border-radius: 18px; border: 1px solid var(--line);
  background: white; overflow: hidden;
  box-shadow: 0 8px 22px rgba(15,33,52,0.07);
  display: flex; flex-direction: column;
}
.panel-header {
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title {
  font-size: 12px; font-weight: 800; letter-spacing: -0.01em;
}
.panel-badge {
  font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 999px;
  background: rgba(15,103,143,0.10); color: var(--blue);
  border: 1px solid rgba(15,103,143,0.18);
}
.runs-list { flex: 1; padding: 8px; overflow: hidden; display: flex; flex-direction: column; gap: 6px; }

.run-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 12px;
  border: 1px solid var(--line);
  background: rgba(248,252,255,0.8);
  transition: border-color 0.3s;
}
.run-row.live { border-color: rgba(15,143,126,0.35); background: rgba(15,143,126,0.05); }
.run-row.done { border-color: rgba(149,169,186,0.5); }

.run-ico {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.run-text-cols { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.run-name { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 2px; }
.run-sub  { font-size: 9.5px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.run-status {
  font-size: 9.5px; font-weight: 800; padding: 3px 6px; border-radius: 999px;
  white-space: nowrap; flex-shrink: 0;
}
.run-status.running {
  background: rgba(15,143,126,0.12); color: var(--sage);
  border: 1px solid rgba(15,143,126,0.3);
}
.run-status.done {
  background: rgba(149,169,186,0.12); color: var(--muted);
  border: 1px solid rgba(149,169,186,0.3);
}

/* progress bar within run row */
.run-bar {
  width: 44px; height: 4px; border-radius: 999px;
  background: rgba(15,103,143,0.12); overflow: hidden; flex-shrink: 0;
}
.run-bar-fill {
  height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--blue), var(--sage));
  transition: width 1s var(--ease);
}

/* ── activity / mini chart panel ── */
.activity-panel {
  border-radius: 18px; border: 1px solid var(--line);
  background: white; overflow: hidden;
  box-shadow: 0 8px 22px rgba(15,33,52,0.07);
  display: flex; flex-direction: column;
}
.mini-chart {
  padding: 12px 14px 8px;
  flex: 1;
}
.chart-label { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
.bar-chart { display: flex; align-items: flex-end; gap: 5px; height: 60px; }
.bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bar {
  width: 100%; border-radius: 5px 5px 0 0;
  opacity: 0.85;
  transform-origin: bottom;
  animation: none;
}
.bar-day { font-size: 8px; color: var(--muted); font-weight: 600; }

/* activity feed */
.activity-feed { padding: 0 12px 10px; display: flex; flex-direction: column; gap: 5px; }
.feed-item {
  display: flex; align-items: flex-start; gap: 7px;
  padding: 6px 8px; border-radius: 10px;
  font-size: 10.5px;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.3s, transform 0.3s;
}
.feed-item.show { opacity: 1; transform: translateY(0); }
.feed-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 3px;
}
.feed-text { line-height: 1.4; }
.feed-text strong { font-weight: 700; }
.feed-time { font-size: 9px; color: var(--muted); margin-left: auto; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
</style>
</head>
<body>
<div class="stage">
  <div class="shell">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        <div class="logo-mark"><span></span><span></span><span></span></div>
        memoo
      </div>
      <div class="nav active">
        <div class="nav-ico" style="color:var(--blue)">
          <svg viewBox="0 0 16 16" fill="currentColor" style="position:absolute;inset:6px;width:14px;height:14px;opacity:0.9">
            <path d="M2 2h5v5H2V2zm0 7h5v5H2V9zm7-7h5v5H9V2zm0 7h5v5H9V9z"/>
          </svg>
        </div>
        Dashboard
      </div>
      <div class="nav">
        <div class="nav-ico" style="color:var(--muted)">
          <svg viewBox="0 0 16 16" fill="currentColor" style="position:absolute;inset:6px;width:14px;height:14px;opacity:0.7">
            <path d="M3 2a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1H3z"/>
          </svg>
        </div>
        Playbooks
      </div>
      <div class="nav">
        <div class="nav-ico" style="color:var(--muted)">
          <svg viewBox="0 0 16 16" fill="currentColor" style="position:absolute;inset:6px;width:14px;height:14px;opacity:0.7">
            <path d="M3 3l11 5-11 5V3z"/>
          </svg>
        </div>
        Runs
      </div>
      <div class="nav">
        <div class="nav-ico" style="color:var(--muted)">
          <svg viewBox="0 0 16 16" fill="currentColor" style="position:absolute;inset:6px;width:14px;height:14px;opacity:0.7">
            <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zM6 5l5 3-5 3V5z"/>
          </svg>
        </div>
        Automations
      </div>

      <div class="live-badge" style="margin-top:auto;">
        <div class="pulse-dot"></div>
        <span id="live-count">3 runs live</span>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <!-- Top -->
      <div class="top-row">
        <div>
          <div class="greeting-kicker">Welcome back</div>
          <div class="greeting-title">Team dashboard</div>
          <div class="greeting-sub">All automations running smoothly</div>
        </div>
        <button class="run-btn">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l12 6-12 6V2z"/></svg>
          Run playbook
        </button>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Playbooks</div>
          <div class="stat-value" id="stat-pb">24</div>
          <div class="stat-delta">↑ 3 this week</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Runs today</div>
          <div class="stat-value" id="stat-runs">0</div>
          <div class="stat-delta">↑ 18% vs yesterday</div>
        </div>
        <div class="stat-card" style="--sand: #d18434;">
          <div class="stat-label">Hours saved</div>
          <div class="stat-value" id="stat-hrs" style="color:var(--sand)">0</div>
          <div class="stat-delta" style="color:var(--sand);">↑ 12h this week</div>
        </div>
      </div>

      <!-- Bottom grid -->
      <div class="bottom-grid">
        <!-- Runs list -->
        <div class="runs-panel">
          <div class="panel-header">
            <div class="panel-title">Recent runs</div>
            <div class="panel-badge" id="run-count-badge">— running</div>
          </div>
          <div class="runs-list" id="runs-list"></div>
        </div>

        <!-- Activity + mini chart -->
        <div class="activity-panel">
          <div class="panel-header">
            <div class="panel-title">Run activity</div>
          </div>
          <div class="mini-chart">
            <div class="chart-label">Runs per day</div>
            <div class="bar-chart" id="bar-chart"></div>
          </div>
          <div class="activity-feed" id="activity-feed"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/* ── Run data ── */
const RUNS = [
  { name:'Customer Onboarding', sub:'CRM → Freshsales',   color:'#0f678f', bg:'rgba(15,103,143,0.10)', pgInitial:72,  status:'running' },
  { name:'Invoice Export',      sub:'Finance → NetSuite', color:'#0f8f7e', bg:'rgba(15,143,126,0.10)', pgInitial:100, status:'done'    },
  { name:'Lead Enrichment',     sub:'Sales → HubSpot',    color:'#d18434', bg:'rgba(209,132,52,0.10)', pgInitial:38,  status:'running' },
  { name:'Deal Stage Sync',     sub:'Ops → Salesforce',   color:'#7b5ea7', bg:'rgba(123,94,167,0.10)', pgInitial:100, status:'done'    },
  { name:'Onboarding Emails',   sub:'Marketing → Loops',  color:'#5f9ea0', bg:'rgba(95,158,160,0.10)', pgInitial:55,  status:'running' },
];

/* ── Bar chart data ── */
const BAR_DATA = [
  { day:'M', val:55 }, { day:'T', val:40 }, { day:'W', val:72 },
  { day:'T', val:61 }, { day:'F', val:88 }, { day:'S', val:34 }, { day:'S', val: 0, current:true },
];
const BAR_COLORS = ['#b8d4e8','#92bdd6','#6aabc5','#4896b2','#2882a0','#0f6f90','rgba(15,103,143,0.4)'];

/* ── Activity feed items ── */
const FEED_ITEMS = [
  { color:'#0f8f7e', text:'<strong>Invoice Export</strong> completed in 4.2s', time:'just now' },
  { color:'#7b5ea7', text:'<strong>Deal Stage Sync</strong> completed in 2.8s', time:'1m ago'  },
  { color:'#0f678f', text:'<strong>Customer Onboarding</strong> started', time:'3m ago'  },
];

/* ─────────────── Build bar chart ─────────────── */
const chart = document.getElementById('bar-chart');
BAR_DATA.forEach((d, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'bar-wrap';
  const h = Math.round((d.val / 100) * 56);
  wrap.innerHTML = `
    <div class="bar" style="height:0px;background:${BAR_COLORS[i]};transition:height 0.6s ${0.05*i}s var(--ease);"></div>
    <div class="bar-day" style="${d.current?'color:var(--blue);font-weight:900':''}">${d.day}</div>`;
  chart.appendChild(wrap);
  // animate bars in
  requestAnimationFrame(() => setTimeout(() => {
    wrap.querySelector('.bar').style.height = h + 'px';
  }, 300 + i * 60));
});

/* ─────────────── Build run rows ─────────────── */
const list = document.getElementById('runs-list');
const runEls = [];
RUNS.forEach((r, i) => {
  const div = document.createElement('div');
  div.className = `run-row ${r.status}`;
  div.style.opacity = '0'; div.style.transform = 'translateY(8px)';
  div.style.transition = `opacity 0.35s ${0.06*i}s, transform 0.35s ${0.06*i}s`;
  div.innerHTML = `
    <div class="run-ico" style="background:${r.bg};color:${r.color}">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
        <path d="${r.status==='running' ? 'M3 2l12 6-12 6V2z' : 'M6.5 11.5l-4-4 1.4-1.4 2.6 2.6 5.6-5.6 1.4 1.4z'}"/>
      </svg>
    </div>
    <div class="run-text-cols">
      <div class="run-name">${r.name}</div>
      <div class="run-sub">${r.sub}</div>
    </div>
    ${r.status==='running' ? `<div class="run-bar"><div class="run-bar-fill" style="width:${r.pgInitial}%" data-target="100"></div></div>` : ''}
    <div class="run-status ${r.status}">${r.status==='running'?'Running':'Done'}</div>`;
  list.appendChild(div);
  runEls.push(div);
  setTimeout(() => {
    div.style.opacity = '1'; div.style.transform = 'translateY(0)';
  }, 200 + i * 70);
});

// update running badge
const runningCount = RUNS.filter(r=>r.status==='running').length;
document.getElementById('run-count-badge').textContent = `${runningCount} running`;

/* ─────────────── Counter animations ─────────────── */
function animateCount(el, target, duration, suffix='') {
  let start = 0;
  const step = target / (duration / 16);
  const timer = setInterval(() => {
    start = Math.min(start + step, target);
    el.textContent = Math.round(start) + suffix;
    if (start >= target) clearInterval(timer);
  }, 16);
}
setTimeout(() => animateCount(document.getElementById('stat-runs'), 47, 1200), 400);
setTimeout(() => animateCount(document.getElementById('stat-hrs'), 34, 1400), 500);

/* ─────────────── Progress bar animation ─────────────── */
const bars = document.querySelectorAll('.run-bar-fill');
bars.forEach(b => {
  setTimeout(() => {
    const target = parseInt(b.dataset.target || '100');
    const current = parseInt(b.style.width);
    if (current < target) {
      // grow slowly while "running"
      const dur = 8000;
      const start = Date.now();
      const grow = () => {
        const elapsed = Date.now() - start;
        const pct = current + (target - current) * Math.min(elapsed / dur, 1);
        b.style.width = pct + '%';
        if (elapsed < dur) requestAnimationFrame(grow);
      };
      requestAnimationFrame(grow);
    }
  }, 800);
});

/* ─────────────── Activity feed ─────────────── */
const feed = document.getElementById('activity-feed');
FEED_ITEMS.forEach((f, i) => {
  const div = document.createElement('div');
  div.className = 'feed-item';
  div.innerHTML = `
    <div class="feed-dot" style="background:${f.color}"></div>
    <div class="feed-text">${f.text}</div>
    <div class="feed-time">${f.time}</div>`;
  feed.appendChild(div);
  setTimeout(() => div.classList.add('show'), 600 + i * 250);
});

/* ─────────────── Live counter increments ─────────────── */
let runsVal = 47;
setInterval(() => {
  runsVal++;
  document.getElementById('stat-runs').textContent = runsVal;
}, 7000);
</script>
</body>
</html>
